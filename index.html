<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeyGen Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #efece6;
    --surface: #f8f6f1;
    --border: #ddd9d0;
    --ink: #2b2620;
    --ink-2: #6b6358;
    --ink-3: #a09890;
    --accent: #c8622a;
    --accent-soft: #f5e8df;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 18px 40px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo {
    width: 30px; height: 30px; border-radius: 6px;
    background: var(--accent); display: grid; place-items: center;
  }
  .logo svg { display: block; }
  header h1 { font-family: 'Lora', serif; font-size: 18px; font-weight: 500; color: var(--ink); }
  header span { font-size: 12px; color: var(--ink-3); }

  main {
    flex: 1;
    max-width: 820px;
    margin: 44px auto;
    width: 100%;
    padding: 0 28px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 26px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .card-title {
    font-family: 'Lora', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
  }
  .card-hint { font-size: 12px; color: var(--ink-3); line-height: 1.5; }

  /* scenes */
  .scenes { display: flex; flex-direction: column; gap: 12px; }

  .scene {
    display: grid;
    grid-template-columns: 86px 1fr 28px;
    gap: 14px;
    align-items: start;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }

  .scene-num {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 6px;
  }

  .photo-box {
    width: 86px; height: 114px;
    border: 2px dashed var(--border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; overflow: hidden;
    background: #eee9e0;
    position: relative;
    transition: border-color .15s;
  }
  .photo-box:hover { border-color: var(--accent); }
  .photo-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .photo-label {
    font-size: 11px; color: var(--ink-3);
    text-align: center; padding: 8px;
    pointer-events: none; line-height: 1.5;
  }

  .scene textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    resize: vertical;
    min-height: 110px;
    outline: none;
    background: var(--surface);
    color: var(--ink);
    line-height: 1.65;
  }
  .scene textarea:focus { border-color: var(--accent); }
  .scene textarea::placeholder { color: var(--ink-3); }

  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--border); font-size: 20px; padding: 2px;
    width: auto; line-height: 1; transition: color .15s;
  }
  .del-btn:hover { color: #c0392b; }

  .add-btn {
    border: 2px dashed var(--border);
    background: transparent;
    color: var(--ink-2);
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all .15s;
    width: 100%;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

  /* voice input */
  input[type=text] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--ink);
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 14px;
    outline: none;
    font-family: 'Inter', sans-serif;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--ink-3); }

  /* generate button */
  .gen-btn {
    width: 100%; padding: 15px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer; transition: opacity .15s;
    letter-spacing: .01em;
  }
  .gen-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .gen-btn:hover:not(:disabled) { opacity: 0.88; }

  /* log */
  #log {
    background: var(--ink); color: #c8bfb0;
    border-radius: 8px; padding: 16px;
    font-size: 12.5px; font-family: 'Courier New', monospace;
    line-height: 1.7; white-space: pre-wrap;
    min-height: 60px; display: none;
  }
  #log.visible { display: block; }

  /* video */
  #videoWrap { display: none; flex-direction: column; gap: 12px; }
  #videoWrap.visible { display: flex; }
  video { width: 100%; border-radius: 10px; background: #000; }
  a.dl {
    display: block; text-align: center; padding: 13px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--ink); text-decoration: none;
    font-size: 14px; font-weight: 500; transition: background .15s;
  }
  a.dl:hover { background: var(--accent-soft); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <polygon points="3,2 13,7 3,12" fill="#fff"/>
    </svg>
  </div>
  <h1>HeyGen Studio</h1>
  <span>AI avatar video generator</span>
</header>

<main>
  <div class="card">
    <div class="card-title">Scenes</div>
    <div class="scenes" id="scenes"></div>
    <button class="add-btn" onclick="addScene()">+ Scene toevoegen</button>
  </div>

  <div class="card">
    <div class="card-title">Voice</div>
    <input type="text" id="voiceId" placeholder="Voice ID — leeg laten voor standaard stem">
    <p class="card-hint">Vind voice IDs via je HeyGen dashboard → Voices.</p>
  </div>

  <button class="gen-btn" id="genBtn" onclick="generate()">Video genereren</button>
  <div id="log"></div>
  <div id="videoWrap">
    <video id="video" controls></video>
    <a id="dlLink" class="dl" href="#" download>⬇ Download video</a>
  </div>
</main>

<script>
let scenes = [];
let idCounter = 0;

function addScene(text = '', photoSrc = null) {
  scenes.push({ id: ++idCounter, text, photoSrc });
  renderScenes();
}

function removeScene(id) {
  if (scenes.length <= 1) return;
  scenes = scenes.filter(s => s.id !== id);
  renderScenes();
}

function renderScenes() {
  const container = document.getElementById('scenes');
  container.innerHTML = '';
  scenes.forEach((sc, i) => {
    const div = document.createElement('div');
    div.className = 'scene';
    div.innerHTML = `
      <div>
        <div class="scene-num">Scene ${String(i + 1).padStart(2, '0')}</div>
        <label class="photo-box" title="Klik om foto te uploaden">
          ${sc.photoSrc
            ? `<img src="${sc.photoSrc}" alt="avatar">`
            : `<span class="photo-label">📷<br>Foto<br>uploaden</span>`}
          <input type="file" accept="image/*" onchange="uploadPhoto(${sc.id}, this)">
        </label>
      </div>
      <textarea placeholder="Plak hier het script voor scene ${i + 1}…"
        oninput="updateText(${sc.id}, this.value)">${sc.text}</textarea>
      <button class="del-btn" onclick="removeScene(${sc.id})" title="Verwijder">×</button>
    `;
    container.appendChild(div);
  });
}

function updateText(id, value) {
  const sc = scenes.find(s => s.id === id);
  if (sc) sc.text = value;
}

function uploadPhoto(id, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const sc = scenes.find(s => s.id === id);
    if (sc) { sc.photoSrc = e.target.result; renderScenes(); }
  };
  reader.readAsDataURL(file);
}

function log(msg) {
  const el = document.getElementById('log');
  el.classList.add('visible');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function setBtn(text, disabled) {
  const b = document.getElementById('genBtn');
  b.textContent = text;
  b.disabled = disabled;
}

async function generate() {
  const filled = scenes.filter(s => s.text.trim());
  if (!filled.length) { alert('Voeg minstens één scene met tekst toe'); return; }

  const script = filled.map((s, i) => `Scene ${i + 1}:\n${s.text.trim()}`).join('\n\n');
  const voiceId = document.getElementById('voiceId').value.trim() || undefined;

  document.getElementById('log').textContent = '';
  document.getElementById('videoWrap').classList.remove('visible');
  setBtn('Bezig…', true);
  log(`${filled.length} scene(s) gevonden`);
  log('Stuurt naar HeyGen…');

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ script, voiceId }),
    });
    const data = await res.json();
    log('API antwoord: ' + JSON.stringify(data));
    if (!res.ok) throw new Error(JSON.stringify(data.error || data.message || data) || `Fout ${res.status}`);

    const videoId = data.data?.video_id || data.video_id;
    if (!videoId) throw new Error('Geen video ID ontvangen: ' + JSON.stringify(data));

    log(`Video ID: ${videoId}`);
    log('HeyGen rendert… (2–5 min)');
    poll(videoId);
  } catch (e) {
    log(`Fout: ${e.message}`);
    setBtn('Opnieuw proberen', false);
  }
}

async function poll(videoId) {
  let tries = 0;
  async function check() {
    tries++;
    try {
      const res = await fetch(`/api/status?id=${videoId}`);
      const data = await res.json();
      const status = data.data?.status || data.status;
      const url = data.data?.video_url || data.video_url;

      if (status === 'completed' && url) {
        log('✓ Video klaar!');
        document.getElementById('video').src = url;
        document.getElementById('dlLink').href = url;
        document.getElementById('videoWrap').classList.add('visible');
        setBtn('Nieuwe video', false);
        return;
      }
      if (status === 'failed') throw new Error('Rendering mislukt bij HeyGen');
      if (tries >= 120) throw new Error('Timeout — probeer later opnieuw');
      log(`Status: ${status} (${tries * 5}s)`);
      setTimeout(check, 5000);
    } catch (e) {
      log(`Fout: ${e.message}`);
      setBtn('Opnieuw proberen', false);
    }
  }
  setTimeout(check, 5000);
}

addScene();
</script>
</body>
</html>
